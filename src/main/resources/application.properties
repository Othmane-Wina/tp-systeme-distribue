spring.application.name=RestAPI

# 1. You must explicitly turn it ON (it is OFF by default)
server.compression.enabled=true

# 2. You must tell it to include JSON (sometimes it defaults to just HTML/Text)
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css

# 3. Your small size limit
server.compression.min-response-size=10
